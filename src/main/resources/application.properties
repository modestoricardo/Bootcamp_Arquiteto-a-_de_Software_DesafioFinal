# ===================================================================
# CONFIGURAÇÕES DA API REST DE PRODUTOS
# Bootcamp Arquiteto de Software - Desafio Final
# ===================================================================

# ===================================================================
# CONFIGURAÇÃO DO SERVIDOR
# ===================================================================
server.port=8080
server.servlet.context-path=/

# ===================================================================
# CONFIGURAÇÃO DO BANCO DE DADOS H2
# ===================================================================
# URL de conexão do banco H2 em memória
spring.datasource.url=jdbc:h2:mem:produtodb

# Driver JDBC do H2
spring.datasource.driverClassName=org.h2.Driver

# Credenciais do banco (H2 aceita qualquer credencial em modo mem)
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# CONFIGURAÇÃO DO JPA/HIBERNATE
# ===================================================================
# Dialeto do Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Estratégia de criação/atualização do schema
# create-drop: cria o schema ao iniciar e remove ao finalizar
# update: atualiza o schema conforme necessário
# validate: apenas valida o schema
spring.jpa.hibernate.ddl-auto=create-drop

# Exibir SQL no console
spring.jpa.show-sql=true

# Formatar SQL para melhor legibilidade
spring.jpa.properties.hibernate.format_sql=true

# Comentários SQL
spring.jpa.properties.hibernate.use_sql_comments=true

# ===================================================================
# CONFIGURAÇÃO DO CONSOLE H2
# ===================================================================
# Habilitar console web do H2
spring.h2.console.enabled=true

# Caminho do console H2
spring.h2.console.path=/h2-console

# Permitir acesso remoto ao console (apenas para desenvolvimento)
spring.h2.console.settings.web-allow-others=false

# ===================================================================
# CONFIGURAÇÃO DO OPENAPI/SWAGGER
# ===================================================================
# Caminho da documentação OpenAPI em JSON
springdoc.api-docs.path=/api-docs

# Caminho da interface Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Ordenar endpoints por método HTTP
springdoc.swagger-ui.operationsSorter=method

# Ordenar tags alfabeticamente
springdoc.swagger-ui.tagsSorter=alpha

# ===================================================================
# CONFIGURAÇÃO DE LOGGING
# ===================================================================
# Nível de log para a aplicação
logging.level.com.empresa.produtoapi=INFO

# Nível de log para o Spring
logging.level.org.springframework=INFO

# Nível de log para Hibernate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================================================
# CONFIGURAÇÃO DE VALIDAÇÃO
# ===================================================================
# Habilitar validação de beans
spring.jpa.properties.javax.persistence.validation.mode=auto

# ===================================================================
# CONFIGURAÇÃO DE ENCODING
# ===================================================================
# Encoding padrão
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ===================================================================
# CONFIGURAÇÃO DE DADOS INICIAIS
# ===================================================================
# Executar data.sql após a criação do schema
spring.jpa.defer-datasource-initialization=true

# ===================================================================
# CONFIGURAÇÃO DE DESENVOLVIMENTO
# ===================================================================
# Habilitar DevTools
spring.devtools.restart.enabled=true

# ===================================================================
# INFORMAÇÕES DA APLICAÇÃO
# ===================================================================
spring.application.name=produto-api
application.version=1.0.0
application.description=API REST para gerenciamento de produtos
